# WalmartPricing — Node Level Cost Model Parameters

# Lookback window for inventory data collection (days)
days_before: 7

# Sales analysis window (days)
days_sales: 90

# Margin thresholds for regular price updates
min_margin_update_prices: 0.059   # 5.9% — below this, increase price (low price update)
max_margin_update_prices: 0.203   # 20.3% — above this, decrease to 20% margin

# Margin targets for NLC computation (all computed per SKU-Node)
# Used in cascading priority: try 11% first, then 8%, then 6%
margins:
  - 0.06
  - 0.08
  - 0.11
  - 0.12
  - 0.13
  - 0.14
  - 0.15
  - 0.20

# Final NLC cascade priority (try highest feasible margin first)
final_nlc_cascade:
  - 0.11    # Best case: 11% margin
  - 0.08    # Fallback: 8% margin
  - 0.06    # Last resort: 6% margin

# MAP (Minimum Advertised Price) constraint
distance_map: 0.05    # NLC must be < MAP * (1 - 0.05) to qualify

# Minimum Walmart margin for NLC eligibility (0 = no constraint)
min_wm_margin: 0.0

# Walmart margin split test percentages
margin_splits:
  - 0.50
  - 0.60

# Inventory thresholds
inventory:
  min_units_primary: 8       # First pass: prefer 8+ units
  min_units_secondary: 4     # Second pass: fill gaps with 4+ units
  metric_group: "min"        # Use min Purchase Price+FET per SKU-Node-date

# DSV file settings
dsv:
  minimum_margin: "4%"       # Minimum margin column value in output DSV
  output_filename_template: "New WalmartB2B DSV to upload {date_str}.csv"
  min_date_filter: "2025-12-30"  # Ignore DSV files before this date

# Safety thresholds (halt pipeline if breached)
thresholds:
  new_nodes_flag: 20000           # Max new SKU-Nodes before alert
  price_increases_flag: 10000     # Max price increases before alert
  price_decreases_flag: 10000     # Max price decreases before alert

# FTP validation settings
ftp:
  perc_failure_flag: 0.015        # 1.5% failure rate triggers alert
  ftp_path: "/external-merchants/WalmartB2B/price"
  credentials_file: "ftp_credentials_fran.json"

# Targets that should NOT receive regular price updates
dont_update_targets:
  - "Margin test"
  - "Wm margin split test"
  - "Shipping cost added"
  - "DSVD test"
  - "Increase test"
