# WalmartPricing — Data Source Configuration
# Data sources used across the Walmart NLC pricing pipeline
#
# Source types:
#   sheet      — Google Sheet (read via gAPI.get_df_of_file with "spreadsheet")
#   sheets_api — Google Sheet via Sheets API (for native GSheets)
#   folder     — Google Drive folder containing CSVs or Sheets
#   sql        — Data warehouse SQL query (via DW.runQuery)
#   local      — Local file (Excel/CSV from shared drive)
#
# Used-by tags reference pipeline steps:
#   step1 = NLC Model (node level cost computation)
#   step2 = Rules & Tests (pricing rules, margin tests)
#   step3 = DSV Generation (build new DSV file)
#   step4 = Tracker Update (update tests tracker)
#   step5 = Upload Validation (FTP response check)

sources:

  # ============================================================
  # GOOGLE API SOURCES — Sheets & Drive
  # ============================================================

  # --- Walmart DSV folder (contains date-named CSV files) ---
  # Files named like "DSV YYYY-MM-DD.csv" or "New WalmartB2B DSV to upload YYYY-MM-DD.csv"
  # Read logic: list all files, parse date from name, pick max date
  walmart_dsv_folder:
    type: folder
    id: "1piuawZRpppmoD-Qdkd1IUj3x4rs-LKny"
    description: "Walmart DSV folder with date-named CSVs (SKU, Price, Source)"
    file_format: csv
    read_cols: ["SKU", "Price", "Source"]
    dtype:
      SKU: str
      Price: float
      Source: str
    column_renames:
      SKU: sku
      Price: walmart_dsv_price
      Source: source
    dataframe: dfCurrDSVOriginal
    used_by: [step1, step3]

  # --- Warehouse node mapping ---
  # Filtered to Channel=WalmartB2B, Warehouse Status=ENABLED,
  # Identifier Status=ENABLED, Inventory Enabled=1
  warehouse_node_mapping:
    type: folder
    id: "1Y4drFI84j2eNQM_XTNb9nY9vBCngszZq"
    description: "Warehouse node mapping (Identifier, Warehouse Code, Type, thresholds)"
    file_format: csv
    csv_separator: ";"
    dtype:
      Identifier: str
    dataframe: dfWHnodeMappingAll
    used_by: [step1]

  # ============================================================
  # DATA WAREHOUSE SOURCES — SQL Queries
  # ============================================================

  # --- Walmart Item Report (offer prices) ---
  # Column renames: item_id -> Item ID, product_code -> Product Code
  dw_walmart_item_report:
    type: sql
    table: "pricing_tests.walmart_item_report"
    query: >
      SELECT *
      FROM pricing_tests.walmart_item_report
      WHERE date = (SELECT MAX(date) FROM pricing_tests.walmart_item_report WHERE date <= '{date_str}')
        AND "1p_offer_status" = 'PUBLISHED'
    template_params: [date_str]
    column_renames:
      item_id: "Item ID"
      product_code: "Product Code"
    description: "Walmart item report with offer prices (latest date, published items only)"
    dataframe: dfWmtItemReport
    used_by: [step1]

  # --- MAP prices ---
  # Column renames: sku -> Product Code, map -> MAP
  dw_map_prices:
    type: sql
    table: "pricing_tests.map_prices"
    query: >
      SELECT map_prices.sku,
             map_prices.map
      FROM pricing_tests.map_prices
      WHERE map_prices.date = (SELECT MAX(date) FROM pricing_tests.map_prices WHERE date <= '{date_str}')
    template_params: [date_str]
    column_renames:
      sku: "Product Code"
      map: "MAP"
    description: "Minimum Advertised Price data"
    dataframe: dfMAP
    used_by: [step1]

  # --- Walmart sales (node-level) ---
  # Uses warehouse.vw_virtual_node_tracker (new_credentials=false for warehouse.* schema)
  dw_walmart_sales:
    type: sql
    table: "warehouse.vw_virtual_node_tracker"
    new_credentials: false
    query: >
      SELECT order_id, sku, externalwarehouseid, order_date, supplier_id,
             quantity, total_inv_amount, profit, external_price, order_type
      FROM warehouse.vw_virtual_node_tracker
      WHERE shop = 'WalmartB2B'
        AND order_type IN ('Sale')
        AND orderstatus NOT IN ('WILL_CALL_NOT_PAID', 'CANCELLED_BEFORE_SHIPPING', 'ERROR')
        AND order_date >= '{start_date}'
        AND order_date < CURRENT_DATE
    template_params: [start_date]
    description: "Walmart B2B sales by SKU-Node for specified date range"
    dataframe: dfSalesSKUNode
    used_by: [step1, step2]

  # ============================================================
  # LOCAL FILE SOURCES — Shared Drive
  # ============================================================

  # --- Shipping costs by node ---
  shipping_costs_by_node:
    type: local
    path: "H:\\Shared drives\\07_Finance\\07_10_Pricing_department\\07_11_01_WalmartB2B\\07_10_01_01 Node level costs\\Config files\\Costs to add by node.xlsx"
    usecols: ["Identifier", "Shipping cost"]
    dtype:
      Identifier: str
    description: "Shipping cost additions per warehouse node"
    dataframe: dfCostNode
    used_by: [step1]

  # --- Rollbacks ---
  # Filtered to active rollbacks (End date > today)
  rollbacks:
    type: local
    path: "H:\\Shared drives\\07_Finance\\07_10_Pricing_department\\07_11_01_WalmartB2B\\07_10_01_03 Rollbacks\\{rollbacks_file}"
    description: "Approved rollback files — filter to End date > today for active rollbacks"
    dataframe: dfRollbacks
    used_by: [step1, step3]

  # --- Tests tracker ---
  tests_tracker:
    type: local
    path: "H:\\Shared drives\\07_Finance\\07_10_Pricing_department\\07_11_01_WalmartB2B\\07_10_01_01 Node level costs\\Final node level costs tracker.csv"
    dtype:
      Identifier: str
    description: "NLC tests tracker with all SKU-Node assignments and test history"
    dataframe: dfCurrentTestsAll
    used_by: [step2, step3, step4]
